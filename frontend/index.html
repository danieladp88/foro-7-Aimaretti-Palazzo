<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Foro 7 - Mesa de Ayuda</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 950px;
      margin: 40px auto;
      background: #f4f6f8;
      color: #222;
    }

    section {
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }

    .form {
      display: grid;
      grid-template-columns: 1fr 1.5fr 140px auto;
      gap: 10px;
      margin-bottom: 24px;
    }

    input, select {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #2563eb;
      color: white;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 16px;
    }

    th, td {
      text-align: left;
      border-bottom: 1px solid #ddd;
      padding: 10px;
      vertical-align: top;
    }

    .summary {
      margin-top: 16px;
      font-weight: bold;
      background: #eef2ff;
      padding: 12px;
      border-radius: 8px;
    }
  </style>
</head>

<body>
  <section>
    <h1>Foro 7 - Mesa de ayuda IT</h1>

    <div class="form">
      <input id="titleInput" placeholder="Título del ticket" />
      <input id="descriptionInput" placeholder="Descripción del problema" />

      <select id="priorityInput">
        <option value="Baja">Baja</option>
        <option value="Media">Media</option>
        <option value="Alta">Alta</option>
      </select>

      <button onclick="createTicket()">Crear ticket</button>
    </div>

    <h2>Tickets cargados</h2>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Título</th>
          <th>Descripción</th>
          <th>Prioridad</th>
          <th>Estado</th>
        </tr>
      </thead>
      <tbody id="ticketsTable"></tbody>
    </table>

    <div class="summary" id="ticketSummary"></div>
  </section>

  <script>
    async function loadTickets() {
      const response = await fetch("/api/tickets");
      const tickets = await response.json();

      const table = document.getElementById("ticketsTable");
      table.innerHTML = "";

      tickets.forEach(ticket => {
        const row = document.createElement("tr");

        row.innerHTML = `
          <td>${ticket.id}</td>
          <td>${ticket.title}</td>
          <td>${ticket.description}</td>
          <td>${ticket.priority}</td>
          <td>${ticket.status}</td>
        `;

        table.appendChild(row);
      });

      await loadStats();
    }

    async function loadStats() {
      const response = await fetch("/api/tickets/stats");
      const data = await response.json();

      const abiertos = data.by_status.Abierto || 0;

      document.getElementById("ticketSummary").textContent =
        `Total de tickets: ${data.total} | Abiertos: ${abiertos}`;
    }

    async function createTicket() {
      const titleInput = document.getElementById("titleInput");
      const descriptionInput = document.getElementById("descriptionInput");
      const priorityInput = document.getElementById("priorityInput");

      const title = titleInput.value.trim();
      const description = descriptionInput.value.trim();
      const priority = priorityInput.value;

      if (!title || !description || !priority) {
        alert("Completá título, descripción y prioridad.");
        return;
      }

      await fetch("/api/tickets", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          title,
          description,
          priority
        })
      });

      titleInput.value = "";
      descriptionInput.value = "";
      priorityInput.value = "Baja";

      await loadTickets();
    }

    loadTickets();
  </script>
</body>
</html>
